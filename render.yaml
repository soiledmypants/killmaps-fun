# Render config for the BULLSTRIKE backend (Node + Express).
# Backend root is server/. Secrets are set in the Render dashboard, NOT here.

services:
  - type: web
    name: bullstrike-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is provided by Render automatically; the server reads process.env.PORT.
      - key: SOLANA_CLUSTER
        value: mainnet-beta
      - key: SOLSCAN_CLUSTER
        value: mainnet
      # Minimum token holding required for a player to be "verified".
      - key: MIN_TOKENS
        value: "250000"
      # Token ticker/symbol surfaced in the UI (e.g. "$BS").
      - key: TOKEN_TICKER
        value: "BS"
      # Production MUST keep real token verification on. (DEV-only bypass flag.)
      - key: DISABLE_TOKEN_VERIFICATION
        value: "false"
      # Anti-farm threshold profile: "launch" (strict — production) or "testing"
      # (relaxed: bypasses creator-self-farm + same-IP, easy to verify payouts).
      - key: REWARD_MODE
        value: launch
      # --- set these in the Render dashboard (sync:false keeps them out of git) ---
      # REQUIRED for persistence — a managed Postgres URL (Neon/Supabase/Render PG).
      # Without it, the free instance's filesystem is wiped on every deploy/restart.
      - key: DATABASE_URL
        sync: false
      # Required for live token verification + payouts (paid mainnet RPC, e.g. Helius).
      - key: SOLANA_RPC_URL
        sync: false
      # The $BS pump.fun token contract address players must hold to be verified.
      - key: TOKEN_CA
        value: CkZTQQw1gNrqv1q4V5txXURJ6Htp1T8Qjz5gZbS4pump
      # Treasury wallet — signs ALL creator reward settlements (and player payouts).
      # This is the ONLY wallet that pays creator rewards.
      - key: TREASURY_WALLET_PRIVATE_KEY
        sync: false
      # Dev/admin wallet (project ownership, buybacks, treasury funding). Kept separate
      # and NOT used for creator reward payouts.
      - key: CREATOR_REWARDS_WALLET_PRIVATE_KEY
        sync: false
      - key: TREASURY_PUBLIC_KEY
        sync: false
      - key: CREATOR_REWARDS_PUBLIC_KEY
        sync: false
      # Frontend origin(s), comma-separated, for CORS — the custom domain
      # (e.g. https://bullstrike.fun) and/or the Netlify URL.
      - key: FRONTEND_URL
        sync: false
      # Protects POST /api/admin/force-settlement (Authorization: Bearer <secret>).
      # Set a long random value. If unset, the admin endpoint is disabled (403).
      - key: ADMIN_SECRET
        sync: false
